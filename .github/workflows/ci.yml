name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel in-progress runs for the same PR/branch when new commits are pushed.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (black / flake8 / isort)
    runs-on: ubuntu-latest
    # Hard gate after PR D1 (black/isort mechanical reformat) and
    # PR D2 (flake8 semantic cleanup): black-clean, isort-clean,
    # flake8-clean. Failures block merge.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install lint tools
        run: |
          python -m pip install --upgrade pip
          pip install "black>=24.0.0" "flake8>=7.0.0" "isort>=5.13.0"

      - name: Run black (check only)
        run: black --check --line-length=88 src/ tests/

      - name: Run isort (check only)
        run: isort --check-only --profile=black --line-length=88 src/ tests/

      - name: Run flake8
        run: flake8 src/ tests/

  typecheck:
    name: Type check (mypy, informational)
    runs-on: ubuntu-latest
    # mypy is informational because pyproject.toml uses strict settings that
    # are not yet fully satisfied by the codebase. The step deliberately
    # always exits 0 so the CheckRun stays green; mypy output is published
    # to the workflow run summary for visibility.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run mypy (informational)
        run: |
          set +e
          mypy src/ 2>&1 | tee mypy.log
          status=${PIPESTATUS[0]}
          {
            echo "### mypy (informational)"
            echo
            echo "Exit code: \`$status\`"
            echo
            if [ "$status" -eq 0 ]; then
              echo "_No mypy errors._"
            else
              echo "<details><summary>mypy output (last 200 lines)</summary>"
              echo
              echo '```'
              tail -n 200 mypy.log
              echo '```'
              echo
              echo "</details>"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
          exit 0

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      # Run the full offline test suite. Live / e2e tests are auto-marked
      # via tests/conftest.py (LIVE_TEST_FILENAME_PATTERNS) and excluded
      # by ``-m "not e2e"``. Pass ``--run-e2e`` locally to include them.
      # Resolves Deferred Risk R2 (marker separation) in
      # reviews/REVIEW_TRACKING.md.
      #
      # ``test_edgar_api.py`` is ignored at collection time because
      # ``sec_edgar_api`` fails to import on CI (pyrate-limiter 3.x API
      # mismatch — Limiter() no longer accepts ``raise_when_fail``). The
      # tests themselves are e2e-only and would be deselected by
      # ``-m "not e2e"`` anyway, but pytest still imports the module
      # during collection. Until EDGAR is re-enabled in PR E, skip
      # collection.
      - name: Run offline test suite
        run: pytest -m "not e2e" -q --ignore=tests/test_edgar_api.py
        env:
          PYTHONPATH: ${{ github.workspace }}
