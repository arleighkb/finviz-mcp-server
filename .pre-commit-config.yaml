# See https://pre-commit.com for usage and config
# Install: pip install pre-commit && pre-commit install
# Run on all files manually: pre-commit run --all-files

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        exclude: \.md$
      - id: end-of-file-fixer
        exclude: \.md$
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ['--maxkb=1024']
      - id: debug-statements
      - id: mixed-line-ending
        args: ['--fix=lf']

  - repo: https://github.com/psf/black
    rev: 24.10.0
    hooks:
      - id: black
        language_version: python3
        args: ['--line-length=88']

  - repo: https://github.com/pycqa/flake8
    rev: 7.1.1
    hooks:
      - id: flake8
        args: ['--max-line-length=88', '--extend-ignore=E203,W503,E501']
        # E203, W503 are black-compatible exceptions.
        # E501 (line too long) is ignored because black handles line length.

  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: ['--profile=black', '--line-length=88']

# Note: mypy is intentionally not added as a pre-commit hook because the
# project's pyproject.toml uses very strict settings (disallow_untyped_defs,
# warn_unused_ignores, etc.) that are not yet satisfied by the existing
# codebase. Run `mypy src/` manually when needed.
